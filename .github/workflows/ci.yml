name: ci

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: find scripts tests -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning

  test:
    name: tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Validate the justfile parses
        run: just --list
      - name: Run the offline test suite
        run: just test
